name: Docs site

# Build and deploy the VitePress documentation site.
#
# Triggers:
# - push to master:    build the site and deploy it to GitHub Pages.
# - pull_request to master: build the site only (no deploy) so doc-breaking
#   changes surface in PR review.
#
# Action versions are pinned to commit SHAs (tag aliases appear in trailing
# comments) so a tag rewrite cannot silently change what runs.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Least-privilege defaults. The deploy job overrides this with the
# `pages: write` + `id-token: write` permissions GitHub Pages requires.
permissions:
  contents: read

# Only one deploy can run at a time. In-progress deploys are not canceled
# so that a started Pages publish gets to finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  DOTNET_VERSION: '8.0.x'

jobs:
  prepare-docs:
    name: Prepare generated docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d  # v5.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install docfx
        run: dotnet tool install -g docfx

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      # Drift gate first, before any regeneration: verifies the committed
      # docs/reference/ pages already match what DocsGen would emit from
      # the current source tree. The subsequent `npm run build` step
      # invokes the `prebuild` hook (in docs/package.json), which runs
      # generate-api-ref.sh + generate-reference.sh and overwrites the
      # tree on disk — so checking drift after the build would always
      # pass. The api/ tree is gitignored and regenerated unconditionally;
      # only the reference/ tree carries committed content to drift-check.
      - name: Verify reference pages match source (drift gate)
        run: bash docs/scripts/generate-reference.sh --check

      # upload-artifact@v4 strips the longest common prefix from the path list
      # (here: 'docs/'), so the artifact root contains 'api/' + 'reference/'
      # rather than 'docs/api/' + 'docs/reference/'. The downstream
      # download-artifact steps in the build and check-links jobs restore the
      # 'docs/' prefix via 'path: docs'. This v4 behaviour differs from v3
      # (which preserved the upload paths verbatim), so the two ends must stay
      # in sync if either is touched.
      - name: Upload generated docs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: generated-docs
          path: |
            docs/api
            docs/reference
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build VitePress site
    needs: prepare-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Download generated docs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: generated-docs
          path: docs

      # Only required on push-to-master (deploy path). Computes the correct
      # base-path for the Pages site and writes it where later steps see it.
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Build site
        working-directory: docs
        run: npm run build
        env:
          DOCS_BASE: /MTConnect.NET/

      # Install the Playwright chromium binary. The `--with-deps` flag also
      # installs the OS-level shared libraries chromium needs on ubuntu-latest.
      - name: Install Playwright chromium
        working-directory: docs
        run: npx playwright install --with-deps chromium

      # Walk every route derived from the markdown source tree in a headless
      # Chromium browser and fail on any client-side 404. Runs against the
      # already-built dist/ artifact so CI catches router misregistrations
      # that the filesystem link checker cannot see.
      - name: Check VitePress routes
        working-directory: docs
        run: npm run check-routes

      # Upload the built artifact only on the deploy path. PR builds stop
      # after the build step (success / failure surfaces in the check).
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/.vitepress/dist

  check-links:
    name: Check internal links
    needs: prepare-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Download generated docs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: generated-docs
          path: docs

      - name: Check internal links
        working-directory: docs
        run: npm run check-links

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
