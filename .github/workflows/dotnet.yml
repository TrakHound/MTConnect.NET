name: build-test-coverage

# Restrict the GITHUB_TOKEN to read-only contents access. The job only
# needs to checkout the repo, run dotnet build / test, and upload TRX +
# coverage artifacts; no commit / release / package-write privileges are
# required. Defense-in-depth against supply-chain attacks via a
# compromised dependency or a test-side RCE.
permissions:
  contents: read

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-and-test:
    name: build-and-test-${{ matrix.os }}-shard${{ matrix.shard }}of${{ matrix.shardTotal }}
    # Skip drafts: run only on push-to-master + ready (non-draft) PRs.
    # The pull_request `types` list above includes `ready_for_review` so
    # CI fires the moment a draft is flipped to ready.
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The ubuntu-latest leg runs Category=E2E, dominated wall-clock
        # by the RouteCheckTests Playwright route walk. Sharding the
        # walk across N parallel matrix entries on ubuntu drops the
        # critical-path wall-clock from N*single-shard down to roughly
        # single-shard; each shard env-injects ROUTE_SHARD_INDEX /
        # ROUTE_SHARD_TOTAL into the test runner, and RouteCheckTests
        # honours those via RouteCheckHelpers.ReadShardEnv +
        # RouteCheckHelpers.ShardRoutes. windows-latest excludes
        # Category=E2E altogether (no Docker for Linux images) so it
        # has no shardable work; the exclude block below caps it at
        # shard 1 of 4.
        os: [ubuntu-latest, windows-latest]
        shard: [1, 2, 3, 4]
        shardTotal: [4]
        include:
          # ubuntu-latest runs the full sweep: Docker is pre-installed
          # on GitHub-hosted Linux runners and Testcontainers can spawn
          # the eclipse-mosquitto + mtconnect/agent images the
          # RequiresDocker / E2E suites need; the XSD source-of-truth
          # files ship in-repo, so XsdLoadStrict also has every
          # prerequisite. Empty filter = no exclusions.
          - os: ubuntu-latest
            testFilter: ""
          # windows-latest GitHub-hosted runners do NOT pre-install
          # Docker for Linux containers (only Windows containers via
          # Hyper-V), so the RequiresDocker / E2E suites that boot
          # Linux images (eclipse-mosquitto:2.0.22,
          # mtconnect/agent:latest) cannot run there. Skip both
          # categories on the Windows leg; XsdLoadStrict has no
          # platform dependency and still runs.
          - os: windows-latest
            testFilter: "Category!=RequiresDocker&Category!=E2E"
        exclude:
          # windows-latest never runs Category=E2E (testFilter excludes
          # it). Running every windows shard would therefore re-run the
          # same unit + integration suite four times for no coverage
          # gain. Cap windows at shard 1 of 4 — the non-E2E suite still
          # runs once; the E2E sharding is ubuntu-only.
          - os: windows-latest
            shard: 2
          - os: windows-latest
            shard: 3
          - os: windows-latest
            shard: 4

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup .NET 8.0 + 9.0
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      # MTConnect.NET-Docs-Tests carries a Category=E2E route walk
      # whose [OneTimeSetUp] runs `npm ci && npm run build` from
      # docs/ when the dist/ artifact is missing, then drives
      # `vitepress preview` through Microsoft.Playwright. Only the
      # ubuntu-latest leg runs Category=E2E (the windows-latest leg
      # excludes it via testFilter), so Node is only required there.
      - name: Setup Node.js (docs e2e prerequisite)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      # `npm run build` in docs/ invokes the `prebuild` hook
      # (`npm run regen`), which calls `bash scripts/generate-api-ref.sh`
      # → `docfx metadata` to produce the /api/ reference tree the
      # VitePress site consumes. The Docs-site workflow installs docfx
      # in its Prepare job; this workflow's E2E leg needs it for the
      # same reason. Only the ubuntu-latest leg runs Category=E2E
      # (windows-latest excludes it via testFilter), so docfx is only
      # required there. Without this, RouteCheckTests.OneTimeSetUp
      # fails with "docfx not found on PATH and ~/.dotnet/tools/docfx
      # is missing" — see PR #181 run 26831500675 job 79113784371.
      - name: Install docfx (docs e2e prerequisite)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet tool install -g docfx
        shell: bash

      - name: Restore dotnet tools (ReportGenerator)
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore MTConnect.NET.sln

      - name: Build (Debug)
        run: dotnet build MTConnect.NET.sln --configuration Debug --no-restore

      # Cache Playwright browser binaries so the Category=E2E
      # [OneTimeSetUp] `playwright install chromium` call is a no-op on
      # cache hit. The key hashes the `playwright-core` package.json that
      # the Microsoft.Playwright NuGet copies into the build output —
      # that file's `version` field directly pins the chromium revision
      # the .NET binding drives. Hashing the csproj instead would only
      # invalidate by coincidence (a future PR adding an unrelated
      # PackageReference would invalidate; an SDK-side change to the
      # chromium revision would not). The step therefore runs AFTER
      # `dotnet build` so the file exists — placement before build
      # would force the key off a workspace-internal artefact (hashFiles
      # cannot reach the NuGet cache under ~/.nuget), so the
      # micro-optimisation of overlapping cache restore with build is
      # sacrificed for key correctness.
      # Both Linux (~/.cache/ms-playwright) and Windows
      # (%USERPROFILE%\AppData\Local\ms-playwright) paths are listed;
      # actions/cache restores only the path that exists on the running
      # OS, so the multi-path entry is safe for both matrix legs.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/tests/MTConnect.NET-Docs-Tests/bin/Debug/net8.0/.playwright/package/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # MTConnect.NET-Integration-Tests is skipped here (its
      # IsTestProject is false unless IntegrationCoverage=true) and run
      # in the dedicated step below so it can use its own
      # tests/coverlet.integration.runsettings. VSTest precedence is
      # CLI --settings > RunSettingsFilePath, so a per-project settings
      # file cannot win against this solution-wide --settings; running
      # the project as its own step is the only way to give it
      # different coverage scoping. See the integration .csproj comment.
      #
      # The --filter expression is matrix-controlled so each OS leg runs
      # the categories it can physically support. ubuntu-latest carries
      # an empty filter (the full sweep: RequiresDocker + E2E +
      # XsdLoadStrict all included); windows-latest carries
      # Category!=RequiresDocker&Category!=E2E (no Linux-image Docker
      # on the hosted Windows runner). See the strategy.matrix.include
      # block above for the rationale.
      - name: Run unit tests with coverage
        env:
          TEST_FILTER: ${{ matrix.testFilter }}
          # ROUTE_SHARD_INDEX / ROUTE_SHARD_TOTAL drive RouteCheckTests
          # via RouteCheckHelpers.ReadShardEnv -> ShardRoutes, splitting
          # the ~1,880-route Playwright walk across N parallel matrix
          # entries. Unset / total=1 collapses to the no-sharding path,
          # which is the local-invocation default. Integers come from
          # the static strategy.matrix definition above, never from
          # github.event.* untrusted input.
          ROUTE_SHARD_INDEX: ${{ matrix.shard }}
          ROUTE_SHARD_TOTAL: ${{ matrix.shardTotal }}
          TRX_NAME: test-results-${{ matrix.os }}-shard${{ matrix.shard }}of${{ matrix.shardTotal }}.trx
        run: |
          if [ -n "$TEST_FILTER" ]; then
            dotnet test MTConnect.NET.sln \
              --configuration Debug \
              --no-build \
              --settings tests/coverlet.runsettings \
              --results-directory TestResults \
              --logger "trx;LogFileName=${TRX_NAME}" \
              --filter "$TEST_FILTER"
          else
            dotnet test MTConnect.NET.sln \
              --configuration Debug \
              --no-build \
              --settings tests/coverlet.runsettings \
              --results-directory TestResults \
              --logger "trx;LogFileName=${TRX_NAME}"
          fi
        shell: bash

      # Same zero-test false-green guard as the integration step, on
      # the solution-wide unit run. A broken adapter wiring or an over-
      # eager filter that discovers nothing must hard-fail rather than
      # exit 0.
      - name: Guard — unit step executed > 0 tests
        env:
          TRX_NAME: test-results-${{ matrix.os }}-shard${{ matrix.shard }}of${{ matrix.shardTotal }}.trx
        run: |
          set -euo pipefail
          trx="TestResults/${TRX_NAME}"
          if [ ! -f "$trx" ]; then
            echo "::error::Unit TRX not found at $trx — the test step did not produce results."
            exit 1
          fi
          total="$(grep -o '<Counters[^>]*total="[0-9]*"' "$trx" \
            | grep -o 'total="[0-9]*"' | grep -o '[0-9]*' | head -n1)"
          if [ -z "${total:-}" ]; then
            echo "::error::Could not parse <Counters total=...> from $trx — refusing to false-green."
            exit 1
          fi
          echo "Unit tests executed: $total"
          if [ "$total" -eq 0 ]; then
            echo "::error::Unit step executed 0 tests — discovery is broken (zero-test false-green guard)."
            exit 1
          fi
        shell: bash

      # Integration suite with its own coverlet settings: the shared
      # configuration plus MTConnect.NET-Common and MTConnect.NET-HTTP
      # excluded from instrumentation, and MaxCpuCount=1 (this step is
      # serial; the shared file no longer pins it). Common+HTTP are the
      # dominant-cost assemblies on the timing-critical in-process
      # Agent/HTTP hot path this suite drives; coverlet IL
      # instrumentation of them on a slow shared runner pushes sample
      # delivery past the test's wait. Both are covered (faster) by
      # MTConnect.NET-Common-Tests / MTConnect.NET-HTTP-Tests. The
      # latter (with its AgentRunner support project
      # MTConnect.NET-Tests-Agents) is a member of MTConnect.NET.sln,
      # so the "Run unit tests with coverage" step above already
      # discovers and runs it under the shared runsettings; it starts a
      # real MTConnectAgentBroker + MTConnectHttpServer and streams
      # Probe/Current/Sample through the HTTP clients, exercising the
      # Common + HTTP runtime path. Its Cobertura ReportGenerator merges
      # with this one, so excluding Common+HTTP here loses no net
      # coverage. MTConnect.NET-SHDR stays instrumented (the
      # integration suite is its only runtime coverage).
      #
      # The integration .csproj sets IsTestProject=false unless
      # IntegrationCoverage=true, so the solution build above compiled
      # it as a non-test assembly. This step therefore rebuilds the
      # project WITH -p:IntegrationCoverage=true (so xunit's VSTest
      # adapter is wired in and tests are discoverable) and only then
      # runs it with --no-build. Without the explicit build the
      # solution-built non-test assembly would discover 0 tests and the
      # step would false-green.
      #
      # As with the unit step, the integration step's --filter is
      # matrix-controlled: ubuntu-latest runs the full sweep
      # (RequiresDocker + E2E + XsdLoadStrict — the campaign-added
      # MqttRelay / JsonMqttProbeEnvelope / HttpProbe / HttpAsset /
      # ConfigurationPolymorphicHttpProbe workflow tests all run on a
      # real broker via Testcontainers), windows-latest excludes
      # RequiresDocker + E2E (no Linux-image Docker on the hosted
      # Windows runner). ClientAgentCommunicationTests,
      # GenerateDevicesXmlTests and HttpServerLoopbackBindingTests
      # carry no category and run on both legs unconditionally.
      - name: Build integration project with IntegrationCoverage flag
        run: |
          dotnet build tests/MTConnect.NET-Integration-Tests/MTConnect.NET-Integration-Tests.csproj \
            --configuration Debug \
            --no-restore \
            -p:IntegrationCoverage=true
        shell: bash

      - name: Run integration tests with coverage
        env:
          TEST_FILTER: ${{ matrix.testFilter }}
          TRX_NAME: test-results-integration-${{ matrix.os }}-shard${{ matrix.shard }}of${{ matrix.shardTotal }}.trx
        run: |
          if [ -n "$TEST_FILTER" ]; then
            dotnet test tests/MTConnect.NET-Integration-Tests/MTConnect.NET-Integration-Tests.csproj \
              --configuration Debug \
              --no-build \
              -p:IntegrationCoverage=true \
              --settings tests/coverlet.integration.runsettings \
              --results-directory TestResults \
              --logger "trx;LogFileName=${TRX_NAME}" \
              --filter "$TEST_FILTER"
          else
            dotnet test tests/MTConnect.NET-Integration-Tests/MTConnect.NET-Integration-Tests.csproj \
              --configuration Debug \
              --no-build \
              -p:IntegrationCoverage=true \
              --settings tests/coverlet.integration.runsettings \
              --results-directory TestResults \
              --logger "trx;LogFileName=${TRX_NAME}"
          fi
        shell: bash

      # Hard-fail the job if the integration step discovered/executed 0
      # tests. A future regression that re-breaks test discovery (e.g.
      # the IntegrationCoverage build wiring) would otherwise false-
      # green: dotnet test exits 0 when it finds nothing to run. Parse
      # the TRX <Counters .../> total and fail when it is 0 or the
      # element is missing.
      - name: Guard — integration step executed > 0 tests
        env:
          TRX_NAME: test-results-integration-${{ matrix.os }}-shard${{ matrix.shard }}of${{ matrix.shardTotal }}.trx
        run: |
          set -euo pipefail
          trx="TestResults/${TRX_NAME}"
          if [ ! -f "$trx" ]; then
            echo "::error::Integration TRX not found at $trx — the test step did not produce results."
            exit 1
          fi
          # Extract the `total` attribute of the single <Counters .../>
          # element the VSTest TRX logger writes. grep -o keeps this
          # dependency-free (no xmllint on the runner image).
          total="$(grep -o '<Counters[^>]*total="[0-9]*"' "$trx" \
            | grep -o 'total="[0-9]*"' | grep -o '[0-9]*' | head -n1)"
          if [ -z "${total:-}" ]; then
            echo "::error::Could not parse <Counters total=...> from $trx — refusing to false-green."
            exit 1
          fi
          echo "Integration tests executed: $total"
          if [ "$total" -eq 0 ]; then
            echo "::error::Integration step executed 0 tests — discovery is broken (zero-test false-green guard)."
            exit 1
          fi
        shell: bash

      - name: Generate coverage HTML + summary
        if: always()
        run: |
          dotnet reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"Html;TextSummary;MarkdownSummary"
        shell: bash

      - name: Upload TRX + coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-results-${{ matrix.os }}-shard${{ matrix.shard }}of${{ matrix.shardTotal }}
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
            coverage-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Surface coverage summary in job log
        if: always()
        env:
          JOB_LABEL: ${{ matrix.os }} shard ${{ matrix.shard }}/${{ matrix.shardTotal }}
        run: |
          if [ -f coverage-report/Summary.txt ]; then
            echo "### Coverage summary (${JOB_LABEL})" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat coverage-report/Summary.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash
